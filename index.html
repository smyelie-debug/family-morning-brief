<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Briefing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f7f4ef;
    --ink: #1a1a18;
    --mid: #6b6860;
    --rule: #dedad3;
    --accent: #2c5f8a;
    --red: #c0392b;
    --card-bg: #ffffff;
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans: 'Source Sans 3', system-ui, sans-serif;
  }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--font-sans);
    font-weight: 300;
    min-height: 100vh;
  }

  /* MASTHEAD */
  .masthead {
    background: var(--ink);
    color: #fff;
    text-align: center;
    padding: 18px 24px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .masthead-title {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .masthead-dateline {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #aaa;
    margin-top: 4px;
  }

  /* TABS */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    background: #fff;
    border-bottom: 1.5px solid var(--rule);
  }
  .tab-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mid);
    padding: 13px 22px;
    border-bottom: 2.5px solid transparent;
    margin-bottom: -1.5px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }
  .tab-btn:hover:not(.active) { color: var(--ink); }

  /* CONTENT */
  .tab-panel { display: none; padding: 28px 20px 60px; max-width: 1100px; margin: 0 auto; }
  .tab-panel.active { display: block; }

  /* GRID */
  .news-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 700px) { .news-grid { grid-template-columns: 1fr; } }

  /* SECTION CARD */
  .section-card {
    background: var(--card-bg);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 22px 22px 16px;
  }
  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mid);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 0;
  }

  /* STORY */
  .story {
    padding: 16px 0 14px;
    border-bottom: 1px solid var(--rule);
  }
  .story:last-of-type { border-bottom: none; padding-bottom: 0; }
  .story-headline {
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 600;
    line-height: 1.28;
    margin-bottom: 7px;
    color: var(--ink);
  }
  .story-summary {
    font-size: 13.5px;
    line-height: 1.6;
    color: #444;
    margin-bottom: 10px;
  }
  .story-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .story-source {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
  }
  .story-discuss-btn {
    background: #f0f0ee;
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    font-size: 13px;
    color: var(--mid);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .story-discuss-btn:hover { background: #e0ddd8; }

  /* LOADING / ERROR */
  .loading-state {
    padding: 32px 0;
    text-align: center;
    color: var(--mid);
    font-size: 13px;
  }
  .spinner {
    width: 22px; height: 22px;
    border: 2px solid var(--rule);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    padding: 18px 0 0;
    font-size: 12.5px;
    color: var(--red);
  }
  .retry-btn {
    margin-top: 8px;
    background: none;
    border: 1px solid var(--red);
    border-radius: 3px;
    color: var(--red);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: var(--font-sans);
  }

  /* REFRESH */
  .refresh-bar {
    text-align: center;
    padding: 10px;
    font-size: 11.5px;
    color: var(--mid);
    letter-spacing: 0.04em;
  }
  .refresh-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 11.5px;
    cursor: pointer;
    font-family: var(--font-sans);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  /* CHAT OVERLAY */
  .chat-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .chat-overlay.open { display: flex; }
  .chat-panel {
    background: #fff;
    width: 100%;
    max-width: 640px;
    border-radius: 10px 10px 0 0;
    padding: 20px;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
  }
  .chat-topic {
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
    color: var(--ink);
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 12px;
    min-height: 80px;
  }
  .chat-msg {
    font-size: 13.5px;
    line-height: 1.55;
    padding: 10px 13px;
    border-radius: 4px;
    max-width: 90%;
  }
  .chat-msg.user { background: var(--ink); color: #fff; align-self: flex-end; }
  .chat-msg.ai { background: #f3f1ee; color: var(--ink); align-self: flex-start; }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input {
    flex: 1;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 9px 12px;
    font-family: var(--font-sans);
    font-size: 13.5px;
    outline: none;
  }
  .chat-input:focus { border-color: var(--ink); }
  .chat-send {
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 9px 16px;
    font-family: var(--font-sans);
    font-size: 13px;
    cursor: pointer;
  }
  .chat-close {
    background: none;
    border: none;
    font-size: 18px;
    color: var(--mid);
    cursor: pointer;
    position: absolute;
    top: 16px;
    right: 18px;
  }
  .chat-panel { position: relative; }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-title">Morning Briefing</div>
  <div class="masthead-dateline" id="dateline"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="news">News</button>
  <button class="tab-btn" data-tab="sports">Sports</button>
  <button class="tab-btn" data-tab="business">Business & Leadership</button>
</div>

<!-- TAB 1: NEWS -->
<div class="tab-panel active" id="tab-news">
  <div class="news-grid">
    <div class="section-card" id="card-us">
      <div class="section-label">US News</div>
      <div class="section-body"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
    </div>
    <div class="section-card" id="card-world">
      <div class="section-label">World News</div>
      <div class="section-body"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
    </div>
    <div class="section-card" id="card-ai">
      <div class="section-label">AI News</div>
      <div class="section-body"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
    </div>
    <div class="section-card" id="card-tech">
      <div class="section-label">Tech News</div>
      <div class="section-body"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
    </div>
    <div class="section-card" id="card-health" style="grid-column:1/-1">
      <div class="section-label">Health & Safety</div>
      <div class="section-body"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
    </div>
  </div>
  <div class="refresh-bar">
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh all</button>
  </div>
</div>

<!-- TAB 2: SPORTS -->
<div class="tab-panel" id="tab-sports">
  <div class="news-grid">
    <div class="section-card" id="card-nhl">
      <div class="section-label">NHL</div>
      <div class="section-body"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
    </div>
    <div class="section-card" id="card-sports">
      <div class="section-label">Global Sports</div>
      <div class="section-body"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
    </div>
  </div>
  <div class="refresh-bar">
    <button class="refresh-btn" onclick="loadSports()">↻ Refresh</button>
  </div>
</div>

<!-- TAB 3: BUSINESS -->
<div class="tab-panel" id="tab-business">
  <div class="news-grid">
    <div class="section-card" id="card-biz">
      <div class="section-label">Business Trends</div>
      <div class="section-body"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
    </div>
    <div class="section-card" id="card-leadership">
      <div class="section-label">Leadership & Management</div>
      <div class="section-body"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
    </div>
  </div>
  <div class="refresh-bar">
    <button class="refresh-btn" onclick="loadBusiness()">↻ Refresh</button>
  </div>
</div>

<!-- CHAT OVERLAY -->
<div class="chat-overlay" id="chatOverlay">
  <div class="chat-panel">
    <button class="chat-close" onclick="closeChat()">✕</button>
    <div class="chat-topic" id="chatTopic"></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="Ask about this story…" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="chat-send" onclick="sendChat()">Send</button>
    </div>
  </div>
</div>

<script>
// ── DATE ──────────────────────────────────────────────────────────
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const now = new Date();
document.getElementById('dateline').textContent =
  `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

// ── TABS ──────────────────────────────────────────────────────────
let sportsLoaded = false, bizLoaded = false;
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const id = 'tab-' + btn.dataset.tab;
    document.getElementById(id).classList.add('active');
    if (btn.dataset.tab === 'sports' && !sportsLoaded) { loadSports(); sportsLoaded = true; }
    if (btn.dataset.tab === 'business' && !bizLoaded) { loadBusiness(); bizLoaded = true; }
  });
});

// ── API CALL ──────────────────────────────────────────────────────
async function fetchStories(systemPrompt, topic) {
  const today = `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 6000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      system: systemPrompt,
      messages: [{ role: 'user', content: `Today is ${today}. Find the top 3 most important ${topic} stories from the last 24 hours. Use web search to find current news. Return ONLY valid JSON, no markdown, no backticks:\n{"stories":[{"headline":"...","summary":"...","source":"..."}]}` }]
    })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || 'API error');
  if (data.stop_reason === 'max_tokens') throw new Error('Response too long — try refreshing');

  // Extract text from content blocks
  const textBlock = data.content.find(b => b.type === 'text');
  const raw = textBlock ? textBlock.text : '';

  // Parse JSON — strip any accidental fences
  const clean = raw.replace(/```json|```/gi, '').trim();
  let result = null;
  try { result = JSON.parse(clean); } catch(_) {
    // Try extracting first {...} block
    const m = clean.match(/\{[\s\S]*\}/);
    if (m) try { result = JSON.parse(m[0]); } catch(_) {}
  }
  if (!result || !result.stories) throw new Error('No stories found — try refreshing');
  return result.stories;
}

// ── RENDER ────────────────────────────────────────────────────────
function renderStories(cardId, stories) {
  const body = document.querySelector(`#${cardId} .section-body`);
  body.innerHTML = stories.map(s => `
    <div class="story">
      <div class="story-headline">${s.headline}</div>
      <div class="story-summary">${s.summary}</div>
      <div class="story-footer">
        <span class="story-source">${s.source} ↗</span>
        <button class="story-discuss-btn" onclick="openChat(${JSON.stringify(s.headline).replace(/'/g,"&#39;")}, ${JSON.stringify(s.summary).replace(/'/g,"&#39;")})">💬</button>
      </div>
    </div>
  `).join('');
}

function renderError(cardId, msg, reloadFn) {
  const body = document.querySelector(`#${cardId} .section-body`);
  body.innerHTML = `<div class="error-state">${msg}<br><button class="retry-btn" onclick="(${reloadFn})()">Try again</button></div>`;
}

function setLoading(cardId) {
  document.querySelector(`#${cardId} .section-body`).innerHTML =
    '<div class="loading-state"><div class="spinner"></div>Loading…</div>';
}

// ── SOURCE POLICY (baked into every prompt) ───────────────────────
// Balanced: Reuters, AP, Axios, The Hill, Wall Street Journal,
//           BBC, Fox News, Washington Examiner, PBS NewsHour, Bloomberg
const BALANCE_INSTRUCTION = `You are a balanced, nonpartisan news editor.
Draw from a politically diverse mix of sources to ensure fair, centrist coverage.
Prioritize: Reuters, Associated Press (AP), Axios, The Hill, Wall Street Journal,
BBC News, Fox News, Washington Examiner, PBS NewsHour, Bloomberg, RealClearPolitics.
Do NOT rely primarily on CNN, MSNBC, Al Jazeera, or exclusively left-leaning outlets.
Each story must note its source outlet. Present facts without partisan framing.
Return ONLY raw JSON — no markdown, no commentary.`;

// ── LOADERS ───────────────────────────────────────────────────────
async function loadSection(cardId, topic) {
  setLoading(cardId);
  try {
    const stories = await fetchStories(BALANCE_INSTRUCTION, topic);
    renderStories(cardId, stories);
  } catch(e) {
    renderError(cardId, e.message, `()=>loadSection('${cardId}','${topic}')`);
  }
}

function loadAll() {
  loadSection('card-us', 'US domestic news and politics — draw from Reuters, AP, Axios, The Hill, Wall Street Journal, Fox News, Washington Examiner, PBS for balance');
  loadSection('card-world', 'international / world news — draw from Reuters, AP, BBC, Wall Street Journal, Bloomberg for balance');
  loadSection('card-ai', 'artificial intelligence news — from MIT Technology Review, Wired, Ars Technica, Bloomberg, Reuters');
  loadSection('card-tech', 'technology news (non-AI) — from Ars Technica, The Verge, Bloomberg Technology, Wall Street Journal');
  loadSection('card-health', 'health and safety news — from Reuters Health, AP, WebMD, NIH, Scientific American, Bloomberg Health');
}

function loadSports() {
  loadSection('card-nhl', 'NHL hockey news, scores, standings, and player updates — from ESPN, The Athletic, AP Sports, NHL.com');
  loadSection('card-sports', 'global leading sports news (soccer, NBA, NFL, golf, tennis, F1) — from ESPN, Reuters Sports, AP Sports, BBC Sport');
}

function loadBusiness() {
  loadSection('card-biz', 'business trends, economics, and market news — from Wall Street Journal, Bloomberg, Financial Times, Reuters Business, Forbes');
  loadSection('card-leadership', 'leadership, management, and organizational insights — from Harvard Business Review, MIT Sloan Management Review, McKinsey Quarterly, Forbes');
}

// Initial load
loadAll();

// ── CHAT ──────────────────────────────────────────────────────────
let chatHistory = [];
let chatContext = '';

function openChat(headline, summary) {
  chatContext = `News story: "${headline}"\n\nSummary: ${summary}`;
  chatHistory = [{ role: 'assistant', content: `Happy to discuss this story about "${headline}". What would you like to know?` }];
  document.getElementById('chatTopic').textContent = headline;
  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML = `<div class="chat-msg ai">Happy to discuss this story. What would you like to know?</div>`;
  document.getElementById('chatOverlay').classList.add('open');
  document.getElementById('chatInput').focus();
}

function closeChat() {
  document.getElementById('chatOverlay').classList.remove('open');
  chatHistory = [];
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML += `<div class="chat-msg user">${text}</div>`;
  chatHistory.push({ role: 'user', content: text });
  msgs.scrollTop = msgs.scrollHeight;

  const thinkingEl = document.createElement('div');
  thinkingEl.className = 'chat-msg ai';
  thinkingEl.textContent = '…';
  msgs.appendChild(thinkingEl);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a knowledgeable, nonpartisan news analyst. The user is asking about this story:\n\n${chatContext}\n\nProvide balanced, factual, concise answers (2–4 sentences). No partisan framing.`,
        messages: chatHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Sorry, something went wrong.';
    chatHistory.push({ role: 'assistant', content: reply });
    thinkingEl.textContent = reply;
  } catch(e) {
    thinkingEl.textContent = 'Error: ' + e.message;
  }
  msgs.scrollTop = msgs.scrollHeight;
}
</script>
</body>
</html>
